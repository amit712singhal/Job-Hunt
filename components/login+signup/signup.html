<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login and Sign Up Form</title>
    <link rel="stylesheet" href="signup.css" />
  </head>

  <body>
    <div class="center">
      <button id="show-login">Login</button>
      <button id="show-signup">Sign Up</button>
    </div>

    <div class="popup login-popup">
      <div class="close-btn">&times;</div>
      <div class="form">
        <h2>Log in</h2>

        <div class="form-element">
          <label for="email">Email</label>
          <input type="text" id="email" placeholder="Enter Email" />
        </div>

        <div class="form-element">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter Password" />
        </div>

        <div class="form-element">
          <input type="checkbox" id="remember-me" />
          <label for="remember-me">Remember me</label>
        </div>

        <div class="form-element">
          <input type="submit" value="Submit" id="login-btn" class="submit-btn" />
        </div>

        <div class="form-element">
          <a href="#">Forgot password?</a>
        </div>
      </div>
    </div>

    <div class="popup signup-popup">
      <div class="close-btn">&times;</div>
      <div class="form">
        <div>
          <div class="social-signup">
            <div tabindex="0" class="login-content">
              <div class="login-inner">
                <span class="icon-container">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill-rule="evenodd"
                    viewBox="0 0 24 24">
                    <path class="icon_svg-fill_as_stroke"
                      d="M20.16 12.193c0-.603-.054-1.182-.155-1.739H12v3.288h4.575a3.91 3.91 0 0 1-1.696 2.565v2.133h2.747c1.607-1.48 2.535-3.659 2.535-6.248z"
                      fill="#4285f4"></path>
                    <path class="icon_svg-fill_as_stroke"
                      d="M12 20.5c2.295 0 4.219-.761 5.625-2.059l-2.747-2.133c-.761.51-1.735.811-2.878.811-2.214 0-4.088-1.495-4.756-3.504h-2.84v2.202A8.497 8.497 0 0 0 12 20.5z"
                      fill="#34a853"></path>
                    <path class="icon_svg-fill_as_stroke"
                      d="M7.244 13.615A5.11 5.11 0 0 1 6.977 12a5.11 5.11 0 0 1 .267-1.615V8.183h-2.84C3.828 9.33 3.5 10.628 3.5 12s.328 2.67.904 3.817l2.84-2.202z"
                      fill="#fbbc05"></path>
                    <path class="icon_svg-fill_as_stroke"
                      d="M12 6.881c1.248 0 2.368.429 3.249 1.271l2.438-2.438C16.215 4.342 14.291 3.5 12 3.5a8.497 8.497 0 0 0-7.596 4.683l2.84 2.202C7.912 8.376 9.786 6.881 12 6.881z"
                      fill="#ea4335"></path>
                  </svg>
                </span>
                <div>Continue with Google</div>
              </div>
            </div>
          </div>

          <div class="social-signup">
            <div tabindex="0" class="login-content">
              <div class="login-inner">
                <span class="icon-container">
                  <svg width="20px" height="20px" style="margin-left: 3px" viewBox="0 0 24 24" role="img"
                    xmlns="http://www.w3.org/2000/svg">
                    <title>LinkedIn icon</title>
                    <path
                      d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                      fill="#0077B5" />
                  </svg>
                </span>
                <div>Continue with LinkedIn</div>
              </div>
            </div>
          </div>

          <div class="social-signup">
            <div tabindex="0" class="login-content">
              <div class="login-inner">
                <span class="icon-container">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path class="icon_svg-fill_as_stroke" fill-rule="evenodd" clip-rule="evenodd"
                      d="M20.5 12a8.5 8.5 0 1 0-9.83 8.397v-5.94H8.513v-2.458h2.159v-1.872c0-2.13 1.269-3.307 3.21-3.307.93 0 1.903.166 1.903.166v2.091h-1.072c-1.056 0-1.385.656-1.385 1.328V12h2.358l-.377 2.457h-1.98v5.94A8.503 8.503 0 0 0 20.5 12Z"
                      fill="#1877F2"></path>
                  </svg>
                </span>
                <div>Continue with Facebook</div>
              </div>
            </div>
          </div>
        </div>

        <content-divider>
          <div class="divider-wrapper">
            <slot>Or</slot>
          </div>
        </content-divider>

        <form action="signup.php" method="POST" id="signup-form" novalidate>

          <div class="form-element">
            <label for="signup-name">Name*</label>
            <input type="text" id="signup-name" name="name" placeholder="Enter Name" required>
          </div>

          <div class="form-element">
            <label for="signup-email">Email*</label>
            <input type="email" id="signup-email" name="email" placeholder="Enter Email" required />
          </div>

          <div class="form-element">
            <label for="signup-password">Password*</label>
            <input type="password" id="signup-password" name="password" placeholder="Enter Password" required
              autocomplete="current-password" />
          </div>

          <div class="form-element">
            <label>Sign up as: </label>
            <input type="radio" id="job-seeker" name="user-type" value="job-seeker" required checked />
            <label for="job-seeker">Job Seeker</label>
            <input type="radio" id="recruiter" name="user-type" value="recruiter" required />
            <label for="recruiter">Recruiter</label>
          </div>

          <div class="form-element">
            <input type="submit" value="Submit" id="signup-btn" class="submit-btn" />
          </div>
        </form>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>

</html>
