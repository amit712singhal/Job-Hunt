<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- Required meta tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Cropper.js CSS (for image cropping functionality) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet" />

    <!-- Bootstrap CSS (only include the latest version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="profile.css" />

  </head>

  <body>

    <nav
      class="container-fluid d-flex justify-content-between flex-lg-row gap-lg-3 gap-1 flex-column align-items-center px-5 navbar align-content-center">
      <div class="logo-section d-flex">
        <img src="../../assets/images/logo.png" height="30" alt="MDB Logo" loading="lazy" />
      </div>

      <div class="menu-items gap-lg-1 d-flex justify-content-center align-items-center">
        <a href="#" class="nav-items text-decoration-none text-center">Home</a>
        <a href="../about_us/about_us.html" class="nav-items text-decoration-none text-center">About Us</a>
        <a href="#" class="nav-items text-decoration-none text-center">Contact Us</a>
        <a href="#" class="nav-items text-decoration-none text-center">Faq's</a>
      </div>

      <form class="d-flex input-group w-auto">
        <input type="search" class="form-control" placeholder="Search" aria-label="Search"
          aria-describedby="search-addon" />
        <span class="input-group-text border-0" id="search-addon">
          <i class="fas fa-search"></i>
        </span>
      </form>

      <div class="dropdown text-end">
        <a href="#" class="c-block link-body-emphasis text-decoration-none" data-bs-toggle="dropdown"
          aria-expanded="false">
          <img src="../../assets/images/default-pfp.jpg" alt="mdo" width="32" height="32" class="rounded-circle" />
        </a>
        <div class="dropdown-menu">
          <!-- Add your dropdown items here -->
          <a class="dropdown-item" href="#">Profile</a>
          <a class="dropdown-item" href="#">Settings</a>
          <a class="dropdown-item" href="../../index.html">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container profile-container" style="box-shadow: none;">
      <div class="row justify-content-center d-flex">
        <div class="col-md-8 ">
          <div class="card  ">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h4 class="text-center">Personal Profile</h4>

            </div>
            <div class="edit-section  d-flex justify-content-end my-2"><span id="editButton"
                class="text-center rounded-2 text-light  Edit-button border-black p-2">Edit<i
                  class="ml-2 fa-solid fa-pen"></i></span><button type="button" id="saveButton"
                class="Save-Button  text-center p-2 text-light rounded-2 border-black" style="display: none">
                Save
                <i class="fa-regular fa-floppy-disk"></i>
              </button></div>

            <div class="card-body d-xl-flex   justify-content-evenly align-items-center ">
              <div
                class="text-center p-xl-4  mb-4 gap-2 align-items-center justify-content-center  d-flex align-content-center justify-content-center flex-column ">

                <img src="../../assets/images/default-pfp.jpg" alt="Profile Picture" class="profile-img img-fluid "
                  id="profileImg" />
                <input type="file" id="profilePicInput" style="display: none" accept="image/*" />
                <button class="btn btn-success" onclick="document.getElementById('profilePicInput').click();">
                  Change Picture
                </button>
              </div>
              <form id="profileForm" class="d-flex flex-wrap flex-column" onsubmit="submitForm(event)">
                <div class="form-group">
                  <label for="name">Name </label>
                  <input type="text" class="form-control p-1 profile-detail" id="name" name="name" readonly />
                </div>
                <div class="form-group">
                  <label for="contactNo">Contact No. </label>
                  <input type="text" class="form-control p-1 profile-detail w-md-50" id="contactNo" name="contactNo"
                    readonly />
                </div>
                <div class="form-group">
                  <label for="email">Email </label>
                  <input type="text" class="form-control p-1 profile-detail" id="email" name="email" readonly />
                </div>
                <div class="form-group">
                  <label for="profession">Profession</label>
                  <input type="text" class="form-control p-1 profile-detail" id="profession" name="profession"
                    readonly />
                </div>
                <div class="form-group">
                  <label for="experience">Experience</label>
                  <input type="text" class="form-control p-1 profile-detail" id="experience" name="experience"
                    readonly />
                </div>
                <div class="form-group">
                  <label for="field">Field</label>
                  <input type="text" class="form-control p-1 profile-detail" id="field" name="field" readonly />
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Cropper Modal -->
    <div class="modal fade" id="cropperModal" tabindex="-1" role="dialog" aria-labelledby="cropperModalLabel"
      aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="cropperModalLabel">Crop Image</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div class="img-container">
              <img id="imageToCrop" src="" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">
              Cancel
            </button>
            <button type="button" id="cropButton" class="btn btn-primary">
              Crop & Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery (include only one version) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

    <!-- FontAwesome (for icons) -->
    <script src="https://kit.fontawesome.com/adb4aacd1b.js" crossorigin="anonymous"></script>

    <!-- Cropper.js (for image cropping functionality) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Popper.js (required by Bootstrap for tooltips, popovers, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>

    <!-- Bootstrap JS (include only the latest version) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>

    <!-- Custom JS -->
    <script src="./profile.js"></script>

  </body>

</html>
