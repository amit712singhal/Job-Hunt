<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Cropper.js CSS (for image cropping functionality) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet" />

    <!-- Bootstrap CSS (only include the latest version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="adminDashboard.css">
  </head>

  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="sidebar">

        <!-- profile -->

        <div>
          <div
            class="text-center p-xl-4  mb-1 gap-2 align-items-center justify-content-center  d-flex align-content-center justify-content-center flex-column ">
            <img src="https://placehold.co/400" alt="Profile Picture" class="profile-img img-fluid " id="profileImg" />
            <input type="file" id="profilePicInput" style="display: none" accept="image/*" />
          </div>
          <h3>Admin Name</h3>
        </div>
        <ul class="menu">
          <li><a href="#">Dashboard</a></li>
          <li><a href="#">Users</a></li>
          <li><a href="#">Companies</a></li>
          <li><a href="#">Jobs</a></li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Navbar -->
        <nav class="navbar">
          <div class="menu-btn">
            <span>&#9776;</span>
          </div>
          <div class="brand">
            <h1>HR APP</h1>
          </div>
          <div class="search">
            <input type="text" placeholder="Search...">
          </div>
        </nav>

        <!-- Dashboard -->
        <section class="dashboard">
          <div class="dashboard-info">
            <div class="info-card">
              <span class="icon">&#128100;</span>
              <div class="info">
                <h3>45621</h3>
                <p>Administrators</p>
              </div>
            </div>
            <div class="info-card">
              <span class="icon">&#128188;</span>
              <div class="info">
                <h3>450</h3>
                <p>Jobs</p>
              </div>
            </div>
            <div class="info-card">
              <span class="icon">&#128203;</span>
              <div class="info">
                <h3>6548</h3>
                <p>Jobs Categories</p>
              </div>
            </div>
          </div>
          <div class="chart">
            <h2>HR Performance</h2>
            <canvas id="performanceChart"></canvas>
          </div>
        </section>
      </main>
    </div>

    <!-- jQuery (include only one version) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

    <!-- FontAwesome (for icons) -->
    <script src="https://kit.fontawesome.com/adb4aacd1b.js" crossorigin="anonymous"></script>

    <!-- Cropper.js (for image cropping functionality) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Popper.js (required by Bootstrap for tooltips, popovers, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>

    <!-- Bootstrap JS (include only the latest version) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>

    <!-- Custom JS -->
    <script src="./adminDashboard.js"></script>
  </body>

</html>
